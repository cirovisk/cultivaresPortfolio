services:
  postgres:
    image: postgres:16-alpine
    container_name: cultivares_pg
    environment:
      POSTGRES_USER: cultivares_user
      POSTGRES_PASSWORD: cultivares_password
      POSTGRES_DB: cultivares_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/setup_api_reader.sql:/docker-entrypoint-initdb.d/01_setup_api_reader.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cultivares_user -d cultivares_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_app
    env_file: .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G

  test:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_test
    env_file: .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    working_dir: /app
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    # Testes unitários usam SQLite in-memory (conftest.py) — não precisam de Postgres

  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_api
    env_file: .env
    volumes:
      - .:/app
    environment:
      - POSTGRES_USER=api_reader
      - POSTGRES_PASSWORD=api_reader_pass
      - PYTHONPATH=/app/src
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  metabase:
    image: metabase/metabase:v0.50.21
    container_name: cultivares_metabase
    profiles: ["dashboard"]
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE_PATH=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  pgdata:
  metabase_data:
