services:
  postgres:
    image: postgres:16-alpine
    container_name: cultivares_pg
    environment:
      POSTGRES_USER: cultivares_user
      POSTGRES_PASSWORD: cultivares_password
      POSTGRES_DB: cultivares_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/setup_api_reader.sql:/docker-entrypoint-initdb.d/01_setup_api_reader.sql:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_app
    env_file: .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 4G

  test:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_test
    env_file: .env
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    working_dir: /app
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    # Testes unitários usam SQLite in-memory (conftest.py) — não precisam de Postgres

  api:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    container_name: cultivares_api
    env_file: .env
    volumes:
      - .:/app
    environment:
      - POSTGRES_USER=api_reader
      - POSTGRES_PASSWORD=api_reader_pass
      - PYTHONPATH=/app/src
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      - postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  pgdata:
