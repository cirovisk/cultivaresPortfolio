services:
  postgres:
    image: postgres:16-alpine
    container_name: cultivares_pg
    environment:
      POSTGRES_USER: cultivares_user
      POSTGRES_PASSWORD: cultivares_password
      POSTGRES_DB: cultivares_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: cultivares_app
    volumes:
      - .:/app
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=cultivares_user
      - POSTGRES_PASSWORD=cultivares_password
      - POSTGRES_DB=cultivares_db
      - PYTHONPATH=/app/src
    depends_on:
      - postgres

  test:
    build: .
    container_name: cultivares_test
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app/src
    working_dir: /app
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    # Testes unitários usam SQLite in-memory (conftest.py) — não precisam de Postgres

volumes:
  pgdata:
